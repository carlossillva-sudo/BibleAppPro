name: CI Pipeline

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [ '18.x', '20.x' ]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      # Backend tests
      - name: Install server dependencies
        run: cd server && npm install
      
      - name: Run server tests
        run: |
          cd server
          npm run test -- --runInBand 2>&1 || exit 1
        env:
          NODE_ENV: test
          USERS_FILE: server/data/users.test.json
      
      - name: Lint server code
        run: cd server && npm run lint --if-present || true
      
      - name: Build server
        run: cd server && npm run build --if-present || true
      
      # Frontend tests
      - name: Install client dependencies
        run: cd client && npm install
      
      - name: Run client tests
        run: cd client && npm run test -- --run --coverage
      
      - name: Lint client code
        run: cd client && npm run lint || true
      
      - name: Build client
        run: cd client && npm run build
      
      # Upload coverage reports
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./client/coverage/coverage-final.json
          flags: frontend
        continue-on-error: true
